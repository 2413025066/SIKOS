.wrapper{

.topbar{

padding:30px;
border-radius:25px;
color:white;
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:30px;

.topbar h1{

.topbar p{

.topbar i{

}

/* FORM BOX */

.form-box{
background:white;

/* INPUT */

.input-group{
margin-bottom:22px;
}

.input-group label{
display:block;
margin-bottom:10px;
font-weight:600;

}

.input-box{
position:relative;
}

.input-box i{
position:absolute;
left:15px;
top:18px;
color:#64748b;
}

.input-box input,
.input-box select,
.input-box textarea{
width:100%;
padding:15px 15px 15px 45px;
border:1px solid #dbeafe;
border-radius:16px;
outline:none;
font-size:15px;
transition:0.3s;
background:#f8fafc;
}

.input-box textarea{
resize:none;
height:140px;
}

.input-box input:focus,
.input-box select:focus,
.input-box textarea:focus{
border-color:#2563eb;
background:white;
box-shadow:0 0 0 4px rgba(37,99,235,0.1);
}

/* BUTTON */

.btn{
width:100%;
padding:16px;
border:none;
border-radius:16px;
background:linear-gradient(135deg,#2563eb,#3b82f6);
color:white;
font-size:16px;
font-weight:600;
cursor:pointer;
transition:0.3s;
}

.btn:hover{
transform:translateY(-3px);
box-shadow:0 10px 20px rgba(37,99,235,0.2);
}

/* RESPONSIVE */

@media(max-width:900px){

.wrapper{
flex-direction:column;
}

.sidebar{
position:relative;

height:auto;
}

.main{

}

.topbar{

text-align:center;
